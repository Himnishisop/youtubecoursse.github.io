let recognition

// LIGHT

let brightness=10

function speak(t){

// SYSTEM PROMPT

const PROMPT=`

You are a smart assistant controlling lights and answering questions.

Respond ONLY in JSON.

Format

{
"type":"light | question",
"action":"optional",
"value":"optional",
"response":"optional",
"speak":true
}

Examples

{"type":"light","action":"brightness","value":255}

{"type":"question","response":"Photosynthesis is how plants make food.","speak":true}

Never output text outside JSON.

`

// AI

async function askAI(cmd){

log("USER → "+cmd)

let res=await fetch(
"https://api.mistral.ai/v1/chat/completions",
{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"mistral-large-2512",

messages:[
{role:"system",content:PROMPT},
{role:"user",content:cmd}
]

})

})

let data=await res.json()

let txt=data.choices[0].message.content

log("AI RAW → "+txt)

let json

try{

json=JSON.parse(txt)

}catch(e){

log("JSON ERROR")

return

}

handleCommand(json)

}

// COMMAND

function handleCommand(cmd){

if(cmd.type==="question"){

if(cmd.speak){

speak(cmd.response)

}

}

if(cmd.type==="light"){

if(cmd.action==="brightness"){

setLight(cmd.value)

}

}

}

// START ASSISTANT

async function startAssistant(){

log("Requesting mic...")

await navigator.mediaDevices.getUserMedia({audio:true})

log("Mic allowed")

const SpeechRecognition=
window.SpeechRecognition||
window.webkitSpeechRecognition

recognition=new SpeechRecognition()

recognition.continuous=true

recognition.onresult=function(e){

let text=e.results[e.results.length-1][0].transcript

log("HEARD → "+text)

text=text.toLowerCase()

if(text.includes("drake")){

let cmd=text.replace("drake","")

askAI(cmd)

}

}

recognition.start()

log("Listening...")

}
